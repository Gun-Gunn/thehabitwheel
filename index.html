<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habit Wheel — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF9F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border:2px solid #FFE0CC;border-radius:20px;padding:2rem;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(255,59,48,0.08)}
.logo{font-size:28px;font-weight:700;color:#FF3B30;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;font-size:13px;color:#bbb;margin-bottom:2rem}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border:2px solid #FFE0CC;border-radius:10px;overflow:hidden}
.tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:#bbb;background:#fff;border:none;transition:all 0.2s}
.tab.active{background:#FF3B30;color:#fff}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.field input{width:100%;border:2px solid #FFD6C8;border-radius:10px;padding:10px 14px;font-size:14px;color:#333;background:#FFF9F0;outline:none;transition:border 0.2s}
.field input:focus{border-color:#FF6B35}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:#FF3B30;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:4px}
.btn:hover{background:#E02020}
.btn:disabled{background:#ffb3ae;cursor:not-allowed}
.msg{font-size:12px;text-align:center;margin-top:12px;padding:8px 12px;border-radius:8px;display:none}
.msg.error{background:#FFEAEA;color:#c62828;display:block}
.msg.success{background:#E8F5E9;color:#2e7d32;display:block}
.msg.info{background:#FFF9F0;color:#FF6B35;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌀 Habit Wheel</div>
  <div class="subtitle">Track your habits, own your growth</div>
  
  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
    <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div class="field">
    <label>Your Name</label>
    <input type="text" id="name" placeholder="YourName" maxlength="30"/>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" id="submitBtn" onclick="handleSubmit()">Login</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://ogigpzekqgdgtldcfyjz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9naWdwemVrcWdkZ3RsZGNmeWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTI4MTksImV4cCI6MjA5NDY2ODgxOX0.3_Jx9NbZWUhWguljC74jzfSuQIrI_-NM_Dphcc0AGk0';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let mode = 'login';

// Already logged in? redirect
sb.auth.getSession().then(({data}) => {
  if(data.session) checkRoleAndRedirect(data.session.user.id);
});

function switchTab(t){
  mode=t;
  document.getElementById('loginTab').className='tab'+(t==='login'?' active':'');
  document.getElementById('signupTab').className='tab'+(t==='signup'?' active':'');
  document.getElementById('submitBtn').textContent=t==='login'?'Login':'Sign Up';
  document.getElementById('msg').className='msg';
}

function showMsg(text, type){
  const el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg '+type;
}

async function handleSubmit(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){showMsg('Email aur password dono bharo','error');return;}
  
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Please wait...';

  if(mode==='login'){
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error){showMsg(error.message,'error');btn.disabled=false;btn.textContent='Login';return;}
    checkRoleAndRedirect(data.user.id);
  } else {
    const name=document.getElementById('name').value.trim()||email.split('@')[0];
    const {data,error}=await sb.auth.signUp({email,password,options:{data:{name}}});
    if(error){showMsg(error.message,'error');btn.disabled=false;btn.textContent='Sign Up';return;}
    showMsg('Account bana! Admin se access lene ke baad login karo.','success');
    btn.disabled=false;btn.textContent='Sign Up';
  }
}

async function checkRoleAndRedirect(userId){
  const {data}=await sb.from('profiles').select('role').eq('id',userId).single();
  if(!data){showMsg('Profile nahi mili, dobara try karo','error');document.getElementById('submitBtn').disabled=false;document.getElementById('submitBtn').textContent='Login';return;}
  if(data.role==='admin') window.location.href='admin.html';
  else if(data.role==='user') window.location.href='app.html';
  else {
    await sb.auth.signOut();
    showMsg('Access pending hai. Admin se approve karwao.','info');
    document.getElementById('submitBtn').disabled=false;
    document.getElementById('submitBtn').textContent='Login';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')handleSubmit();});
</script>
</body>
</html>
