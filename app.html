<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Habit Wheel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF9F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.app{padding:1rem;max-width:680px;margin:0 auto;background:#FFF9F0}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.title{font-size:22px;font-weight:500;color:#FF3B30}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:6px}
.nav-btn{background:#fff;border:2px solid #FFD6C8;border-radius:8px;padding:4px 10px;cursor:pointer;color:#FF3B30;font-size:13px;transition:all 0.2s}
.nav-btn:hover{background:#FFF0EB;border-color:#FF9500}
.month-display{font-size:14px;font-weight:500;color:#FF3B30;min-width:130px;text-align:center}
.year-sel{padding:5px 8px;border:2px solid #FFD6C8;border-radius:8px;background:#fff;color:#333;font-size:13px;cursor:pointer}
.year-sel:focus{outline:none;border-color:#FF6B35}
.logout-btn{padding:5px 12px;border:2px solid #FFD6C8;border-radius:8px;background:#fff;color:#FF3B30;cursor:pointer;font-size:12px;transition:all 0.2s}
.logout-btn:hover{background:#FFEAEA}
.habits-section{background:#fff;border:2px solid #FFE0CC;border-radius:14px;padding:1rem;margin-bottom:1rem}
.habits-section-title{font-size:11px;color:#999;margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.5px}
.habit-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.habit-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.habit-input{flex:1;border:2px solid #FFD6C8;border-radius:8px;padding:5px 10px;font-size:13px;color:#333;background:#FFF9F0}
.habit-input:focus{outline:none;border-color:#FF6B35}
.del-habit-btn{background:none;border:2px solid #FFD6C8;border-radius:8px;width:30px;height:30px;cursor:pointer;color:#FF3B30;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.del-habit-btn:hover{background:#FFEAEA;border-color:#FF3B30}
.add-habit-row{display:flex;gap:8px;margin-top:8px}
.add-habit-input{flex:1;border:2px dashed #FFD6C8;border-radius:8px;padding:5px 10px;font-size:13px;color:#333;background:#fff}
.add-habit-input:focus{outline:none;border-color:#FF9500}
.add-habit-btn{padding:5px 14px;border:none;border-radius:8px;background:#FF3B30;color:#fff;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:background 0.2s}
.add-habit-btn:hover{background:#E02020}
.max-note{font-size:11px;color:#bbb;margin-top:6px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#222;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#2e7d32}
.toast.error{background:#c62828}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:0.75rem;justify-content:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.legend-dot{width:10px;height:10px;border-radius:50%}
.wheel-wrap{display:flex;justify-content:center;margin:0.5rem 0}
.stats-row{display:grid;gap:8px;margin-top:1rem}
.stat-card{background:#fff;border:2px solid #FFE0CC;border-radius:10px;padding:8px;text-align:center}
.stat-pct{font-size:16px;font-weight:500}
.stat-name{font-size:10px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-note{text-align:center;font-size:11px;color:#bbb;margin-bottom:0.5rem}
.loading{text-align:center;padding:3rem;color:#bbb;font-size:14px}
</style>
</head>
<body>
<div class="app" id="mainApp" style="display:none">
  <div class="top">
    <div class="title">🌀 Habit Wheel</div>
    <div id="greetingText" style="font-size:13px;color:#FF6B35;font-weight:500"></div>
    <div class="top-right">
      <select class="year-sel" id="yearSel"></select>
      <div class="month-nav">
        <button class="nav-btn" id="prevMonth">&#8249;</button>
        <div class="month-display" id="monthDisplay"></div>
        <button class="nav-btn" id="nextMonth">&#8250;</button>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="habits-section">
    <div class="habits-section-title">Your habits</div>
    <div id="habitsRow"></div>
    <div class="add-habit-row" id="addRow">
      <input class="add-habit-input" id="newHabitInput" placeholder="New habit name..." maxlength="30"/>
      <button class="add-habit-btn" id="addHabitBtn">+ Add</button>
    </div>
    <div class="max-note" id="maxNote"></div>
  </div>

  <div class="legend" id="legend"></div>
  <div class="info-note" id="infoNote"></div>
  <div class="wheel-wrap">
    <svg id="wheel" width="560" height="560" viewBox="0 0 560 560" style="max-width:100%;height:auto"></svg>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div style="text-align:center;padding:1.5rem 0 0.5rem;font-size:12px;color:#bbb">
  Need help? 
  <a href="mailto:gungunsindhwani5@gmail.com" style="color:#FF6B35;text-decoration:none;font-weight:500">
    gungunsindhwani5@gmail.com
  </a>
</div>
</div>

<div class="loading" id="loadingScreen">Loading...</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ogigpzekqgdgtldcfyjz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9naWdwemVrcWdkZ3RsZGNmeWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTI4MTksImV4cCI6MjA5NDY2ODgxOX0.3_Jx9NbZWUhWguljC74jzfSuQIrI_-NM_Dphcc0AGk0';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const ALL_COLORS=['#4CAF50','#FF9800','#2196F3','#E91E63','#9C27B0','#00BCD4','#FF5722','#8BC34A'];
const ALL_LIGHT= ['#C8E6C9','#FFE0B2','#BBDEFB','#FCE4EC','#E1BEE7','#B2EBF2','#FFCCBC','#DCEDC8'];
const MAX_HABITS=8;
const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

let state={habits:['Morning walk','Study 1hr','No junk food','Read 30min'],data:{},year:2026,month:5};
let currentUser=null;
let saveTimer=null;
let toastTimer=null;

// ── AUTH ──
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}

  const {data:profile}=await sb.from('profiles').select('role').eq('id',session.user.id).single();
  if(!profile||profile.role==='pending'){
    await sb.auth.signOut();
    window.location.href='index.html';
    return;
  }

  currentUser=session.user;
  const {data:nameProfile}=await sb.from('profiles').select('name').eq('id',session.user.id).single();
  const name=nameProfile?.name||session.user.email.split('@')[0];
  document.getElementById('greetingText').textContent='Hello, '+name+' 👋';
  await loadData();
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  initControls();
  render();
}

async function logout(){
  await sb.auth.signOut();
  window.location.href='index.html';
}

// ── DATA: Supabase ──
async function loadData(){
  const now=new Date();
  state.year=now.getFullYear();
  state.month=now.getMonth()+1;

  const {data}=await sb.from('habit_data').select('habits,data').eq('user_id',currentUser.id).single();
  if(data){
    if(data.habits&&data.habits.length>0) state.habits=data.habits;
    if(data.data) state.data=data.data;
  }
}

async function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const {data:existing}=await sb.from('habit_data').select('id').eq('user_id',currentUser.id).single();
    let error;
    if(existing){
      ({error}=await sb.from('habit_data').update({
        habits:state.habits,
        data:state.data,
        updated_at:new Date().toISOString()
      }).eq('user_id',currentUser.id));
    } else {
      ({error}=await sb.from('habit_data').insert({
        user_id:currentUser.id,
        habits:state.habits,
        data:state.data,
        updated_at:new Date().toISOString()
      }));
    }
    if(error) showToast('Save failed!','error');
    else showToast('✓ Saved','success');
  },800);
}

// ── TOAST ──
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='toast',2000);
}

// ── CONTROLS ──
function initControls(){
  const yearSel=document.getElementById('yearSel');
  yearSel.innerHTML='';
  for(let y=2024;y<=2030;y++){
    const o=document.createElement('option');
    o.value=y;o.textContent=y;
    if(y===state.year)o.selected=true;
    yearSel.appendChild(o);
  }
  yearSel.onchange=()=>{state.year=parseInt(yearSel.value);render();};
  document.getElementById('prevMonth').onclick=()=>{
    state.month--;
    if(state.month<1){state.month=12;state.year--;document.getElementById('yearSel').value=state.year;}
    render();
  };
  document.getElementById('nextMonth').onclick=()=>{
    state.month++;
    if(state.month>12){state.month=1;state.year++;document.getElementById('yearSel').value=state.year;}
    render();
  };
}

// ── HELPERS ──
function getDays(){return new Date(state.year,state.month,0).getDate();}
function monthKey(){return`${state.year}-${String(state.month).padStart(2,'0')}`;}
function cellKey(d,hi){return`${monthKey()}:${d}:${hi}`;}
function isFuture(day){const now=new Date();now.setHours(0,0,0,0);return new Date(state.year,state.month-1,day)>now;}
function isToday(day){const now=new Date();return state.year===now.getFullYear()&&state.month===(now.getMonth()+1)&&day===now.getDate();}

// ── ACTIONS ──
function toggleCell(day,hi){
  if(isFuture(day))return;
  const k=cellKey(day,hi);
  state.data[k]=!state.data[k];
  if(!state.data[k])delete state.data[k];
  save();renderWheel();renderStats();
}

function addHabit(){
  const input=document.getElementById('newHabitInput');
  const val=input.value.trim();
  if(!val||state.habits.length>=MAX_HABITS)return;
  state.habits.push(val);
  input.value='';
  save();render();
}

function deleteHabit(i){
  if(state.habits.length<=1)return;
  if(!confirm(`Delete "${state.habits[i]}"?`))return;
  state.habits.splice(i,1);
  save();render();
}

function updateHabit(i,val){
  state.habits[i]=val;
  save();renderLegend();renderStats();
}

// ── SVG ──
function polarToXY(cx,cy,r,angleDeg){const rad=(angleDeg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
function arcPath(cx,cy,r1,r2,startDeg,endDeg){
  const s1=polarToXY(cx,cy,r1,startDeg),e1=polarToXY(cx,cy,r1,endDeg);
  const s2=polarToXY(cx,cy,r2,endDeg),e2=polarToXY(cx,cy,r2,startDeg);
  const large=(endDeg-startDeg)>180?1:0;
  return`M${s1.x},${s1.y} A${r1},${r1} 0 ${large} 1 ${e1.x},${e1.y} L${s2.x},${s2.y} A${r2},${r2} 0 ${large} 0 ${e2.x},${e2.y} Z`;
}
function ringWidth(){return Math.floor((245-62-(state.habits.length-1)*2)/state.habits.length);}

// ── RENDER ──
function renderHabits(){
  document.getElementById('habitsRow').innerHTML=state.habits.map((h,i)=>`
    <div class="habit-row">
      <div class="habit-dot" style="background:${ALL_COLORS[i]}"></div>
      <input class="habit-input" value="${h.replace(/"/g,'&quot;')}" placeholder="Habit ${i+1}" oninput="updateHabit(${i},this.value)"/>
      ${state.habits.length>1?`<button class="del-habit-btn" onclick="deleteHabit(${i})" title="Delete">🗑</button>`:''}
    </div>
  `).join('');
  const addRow=document.getElementById('addRow'),maxNote=document.getElementById('maxNote');
  if(state.habits.length>=MAX_HABITS){addRow.style.display='none';maxNote.textContent='Max 8 habits reached';}
  else{addRow.style.display='flex';maxNote.textContent='';}
}

function renderLegend(){
  document.getElementById('legend').innerHTML=state.habits.map((h,i)=>`
    <div class="legend-item"><div class="legend-dot" style="background:${ALL_COLORS[i]}"></div><span>${h||'Habit '+(i+1)}</span></div>
  `).join('');
}

function renderWheel(){
  const days=getDays(),cx=280,cy=280,innerR=62,ringGap=2,ringW=ringWidth(),anglePerDay=360/days;
  let html='';
  const now=new Date();
  const isCurrentMonth=state.year===now.getFullYear()&&state.month===(now.getMonth()+1);
  const isPastMonth=(new Date(state.year,state.month-1,1))<new Date(now.getFullYear(),now.getMonth(),1);
  document.getElementById('monthDisplay').textContent=MONTH_NAMES[state.month-1];

  for(let hi=0;hi<state.habits.length;hi++){
    const r1=innerR+(hi*(ringW+ringGap)),r2=r1+ringW;
    for(let d=1;d<=days;d++){
      const startA=(d-1)*anglePerDay+0.6,endA=d*anglePerDay-0.6;
      const done=!!state.data[cellKey(d,hi)];
      const future=isFuture(d)&&!isPastMonth,today=isToday(d);
      let fill,opacity=1,cursor='pointer';
      if(done)fill=ALL_COLORS[hi];
      else if(future){fill='#EFEFEF';opacity=0.4;cursor='not-allowed';}
      else fill=ALL_LIGHT[hi];
      const path=arcPath(cx,cy,r1,r2,startA,endA);
      const onclick=future?'':` onclick="toggleCell(${d},${hi})"`;
      html+=`<path d="${path}" fill="${fill}" stroke="${today?'#FF3B30':'#fff'}" stroke-width="${today?2.5:1}" opacity="${opacity}" style="cursor:${cursor}"${onclick}><title>${MONTH_NAMES[state.month-1]} ${d} — ${state.habits[hi]} — ${done?'✅ Done':'⬜ Not done'}</title></path>`;
    }
  }
  const labelR=innerR+(state.habits.length*(ringW+ringGap))+15;
  for(let d=1;d<=days;d++){
    const angle=(d-0.5)*anglePerDay,pos=polarToXY(cx,cy,labelR,angle),today=isToday(d),future=isFuture(d)&&!isPastMonth;
    html+=`<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="middle" font-size="${today?13:10}" font-weight="${today?'500':'400'}" fill="${today?'#FF3B30':future?'#ccc':'#888'}">${d}</text>`;
  }
  html+=`<text x="${cx}" y="${cy-18}" text-anchor="middle" font-size="13" font-weight="500" fill="#FF3B30">${MONTH_NAMES[state.month-1]}</text>`;
  html+=`<text x="${cx}" y="${cy}" text-anchor="middle" font-size="11" fill="#bbb">${days} days</text>`;
  html+=`<text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="10" fill="#ccc">tap to fill</text>`;
  document.getElementById('wheel').innerHTML=html;

  const infoNote=document.getElementById('infoNote');
  if(isPastMonth)infoNote.textContent='Past month — you can still edit entries';
  else if(isCurrentMonth)infoNote.textContent='Future dates are locked';
  else infoNote.textContent='Future month — dates will unlock when the time comes';
}

function renderStats(){
  const days=getDays();
  const isPastMonth=(new Date(state.year,state.month-1,1))<new Date(new Date().getFullYear(),new Date().getMonth(),1);
  const countableDays=isPastMonth?days:Array.from({length:days},(_,i)=>i+1).filter(d=>!isFuture(d)).length;
  const cols=state.habits.length<=4?state.habits.length:Math.ceil(state.habits.length/2);
  document.getElementById('statsRow').style.gridTemplateColumns=`repeat(${cols},1fr)`;
  document.getElementById('statsRow').innerHTML=state.habits.map((h,i)=>{
    const done=Array.from({length:days},(_,d)=>d+1).filter(d=>state.data[cellKey(d,i)]).length;
    const pct=countableDays?Math.round(done/countableDays*100):0;
    return`<div class="stat-card"><div class="stat-pct" style="color:${ALL_COLORS[i]}">${pct}%</div><div class="stat-name">${h||'Habit '+(i+1)}</div></div>`;
  }).join('');
}

function render(){renderHabits();renderLegend();renderWheel();renderStats();}

document.getElementById('addHabitBtn').onclick=addHabit;
document.getElementById('newHabitInput').onkeydown=e=>{if(e.key==='Enter')addHabit();};

init();
</script>
</body>
</html>
